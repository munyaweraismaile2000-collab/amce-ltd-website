<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMCE Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

header{
background:#0f172a;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,
textarea{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
padding:12px 20px;
background:#d97706;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#b45309;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

</style>

</head>

<body>

<header>

<h2>AMCE Admin Dashboard</h2>

<button id="logoutBtn">
Logout
</button>

</header>

<div class="container">

<div class="card">

<h3>Add New Project</h3>

<input
type="text"
id="title"
placeholder="Project Title">

<textarea
id="description"
placeholder="Project Description">
</textarea>

<input
type="text"
id="location"
placeholder="Location">

<input
type="text"
id="category"
placeholder="Category">

<input
type="text"
id="status"
placeholder="Status">

<label>

<input
    type="file"
    id="image"
    accept="image/*">

<button id="saveBtn">
Save Project
</button>

</div>

<div class="card">

<h3>Projects</h3>

<table>

<thead>

<tr>
<th>Title</th>
<th>Category</th>
<th>Location</th>
<th>Status</th>
</tr>

</thead>

<tbody id="projectsTable">

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
