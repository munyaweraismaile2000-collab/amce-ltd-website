<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMCE Admin Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#fff;
      width:360px;
      padding:30px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:12px;
      background:#d97706;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#b45309;
    }

    #message{
      margin-top:15px;
      text-align:center;
    }
  </style>

</head>

<body>

<div class="login-box">

<h2>AMCE Admin</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="styles/js/supabase.js"></script>
<script src="styles/js/admin.js"></script>

</body>
</html>
